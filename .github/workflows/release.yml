name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) — no API token stored
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build

      # The version is single-sourced from agentcli.__version__, so the tag and the
      # artifact can still disagree if someone tags without bumping. Fail loudly.
      - name: Tag must match the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG=$(python -c "import sys; sys.path.insert(0,'src'); import agentcli; print(agentcli.__version__)")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::tag v$TAG != agentcli.__version__ $PKG"; exit 1; }

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Attach dists to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
