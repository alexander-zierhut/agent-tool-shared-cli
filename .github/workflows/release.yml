name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) — no API token stored
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build

      # The version is single-sourced from agentcli.__version__, so the tag and the
      # artifact can still disagree if someone tags without bumping. Fail loudly.
      #
      # Read it from the BUILT WHEEL, not by importing the package: `import agentcli`
      # pulls in rich/keyring, which this job deliberately does not install — the
      # first cut of this check died on ModuleNotFoundError. Reading the artifact is
      # also strictly better, since it validates the exact file being uploaded.
      - name: Tag must match the built version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          WHL=$(ls dist/*.whl)
          BUILT=$(basename "$WHL" | cut -d- -f2)   # agent_tool_shared_cli-0.1.0-py3-none-any.whl
          TAG="${GITHUB_REF_NAME#v}"
          echo "built=$BUILT tag=$TAG  ($(basename "$WHL"))"
          [ "$BUILT" = "$TAG" ] || { echo "::error::tag v$TAG != built version $BUILT"; exit 1; }

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Re-running a release (to fix a failed per-platform job, say) must not
          # die on "File already exists" for a version that published fine. A red
          # release for an already-correct artifact trains people to ignore red.
          # A forgotten version bump is still caught by the tag-vs-built guard above.
          skip-existing: true

      - name: Attach dists to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
